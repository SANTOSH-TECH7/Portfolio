<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body class="d-flex align-items-center justify-content-center" style="min-height:100vh;">
  <div id="particles-js"></div>
  <div class="glass-card p-5" style="width:100%;max-width:420px;position:relative;z-index:2;">
    <div class="text-center mb-4">
      <i class="fas fa-shield-alt fa-2x mb-2" style="color:var(--primary)"></i>
      <h4 class="gradient-text fw-bold">Admin Login</h4>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">Email</label>
        <input type="email" name="email" class="form-control dark-input" placeholder="admin@email.com" required/>
      </div>
      <div class="mb-4">
        <label class="form-label small" style="color:var(--text-muted)">Password</label>
        <input type="password" name="password" class="form-control dark-input" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-glow w-100">
        <i class="fas fa-sign-in-alt me-2"></i>Login
      </button>
    </form>
    <div class="text-center mt-3">
      <a href="/" style="color:var(--text-muted);font-size:0.85rem;">← Back to Portfolio</a>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    particlesJS('particles-js',{particles:{number:{value:40},color:{value:'#2563eb'},shape:{type:'circle'},opacity:{value:0.3},size:{value:2},line_linked:{enable:true,distance:130,color:'#2563eb',opacity:0.2,width:1},move:{enable:true,speed:1.5}},retina_detect:true});
  </script>
</body>
</html>
