<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Education</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar glass-nav px-4 py-3">
  <span class="navbar-brand gradient-text fw-bold" style="font-family:'Orbitron',sans-serif;">Manage Education</span>
  <div class="d-flex gap-3">
    <a href="/dashboard" class="btn btn-sm btn-outline-light">← Dashboard</a>
  </div>
</nav>
<div class="container py-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="row g-4">
    <div class="col-lg-5">
      <div class="glass-card p-4">
        <h5 class="gradient-text fw-bold mb-4">Add Education</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Degree / Course</label>
            <input type="text" name="degree" class="form-control dark-input" required/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Institution</label>
            <input type="text" name="institution" class="form-control dark-input" required/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Place</label>
            <input type="text" name="place" class="form-control dark-input"/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Year of Passing</label>
            <input type="text" name="year" class="form-control dark-input" placeholder="e.g. 2026"/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Percentage / Grade</label>
            <input type="text" name="percentage" class="form-control dark-input"/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Status (if pursuing)</label>
            <input type="text" name="status" class="form-control dark-input" placeholder="Currently Pursuing"/>
          </div>
          <div class="mb-4">
            <label class="form-label small" style="color:var(--text-muted)">Sort Order (1 = first)</label>
            <input type="number" name="sort_order" class="form-control dark-input" value="99"/>
          </div>
          <button type="submit" class="btn btn-glow w-100">Add Education</button>
        </form>
      </div>
    </div>

    <div class="col-lg-7">
      {% for e in education %}
      <div class="glass-card p-4 mb-3">
        <form method="POST" action="/edit-education/{{ e.id }}">
          <div class="row g-2">
            <div class="col-md-6">
              <input type="text" name="degree" class="form-control dark-input form-control-sm" value="{{ e.degree }}" placeholder="Degree" required/>
            </div>
            <div class="col-md-6">
              <input type="text" name="institution" class="form-control dark-input form-control-sm" value="{{ e.institution }}" placeholder="Institution" required/>
            </div>
            <div class="col-md-6">
              <input type="text" name="place" class="form-control dark-input form-control-sm" value="{{ e.place or '' }}" placeholder="Place"/>
            </div>
            <div class="col-md-3">
              <input type="text" name="year" class="form-control dark-input form-control-sm" value="{{ e.year or '' }}" placeholder="Year"/>
            </div>
            <div class="col-md-3">
              <input type="text" name="percentage" class="form-control dark-input form-control-sm" value="{{ e.percentage or '' }}" placeholder="%"/>
            </div>
            <div class="col-md-6">
              <input type="text" name="status" class="form-control dark-input form-control-sm" value="{{ e.status or '' }}" placeholder="Status"/>
            </div>
            <div class="col-md-2">
              <input type="number" name="sort_order" class="form-control dark-input form-control-sm" value="{{ e.sort_order }}" placeholder="Order"/>
            </div>
            <div class="col-md-4 d-flex gap-2">
              <button type="submit" class="btn btn-sm btn-outline-primary flex-fill">Save</button>
              <a href="/delete-education/{{ e.id }}" class="btn btn-sm btn-outline-danger flex-fill" onclick="return confirm('Delete?')">Del</a>
            </div>
          </div>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
