<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Project</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<div class="container py-5" style="max-width:720px;">
  <a href="/dashboard" class="btn btn-sm btn-outline-light mb-4">← Dashboard</a>
  <div class="glass-card p-4">
    <h4 class="gradient-text fw-bold mb-4">Add New Project</h4>
    <form method="POST">
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">Title</label>
        <input type="text" name="title" class="form-control dark-input" required/>
      </div>
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">Description</label>
        <textarea name="description" class="form-control dark-input" rows="3" required></textarea>
      </div>
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">Category (e.g. AI / ML, Automation, Web)</label>
        <input type="text" name="category" class="form-control dark-input"/>
      </div>
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">Tools (comma separated)</label>
        <input type="text" name="tools" class="form-control dark-input" placeholder="Python, TensorFlow, Flask"/>
      </div>
      <div class="row">
        <div class="col-md-6 mb-3">
          <label class="form-label small" style="color:var(--text-muted)">Metric Name</label>
          <input type="text" name="metric_name" class="form-control dark-input" placeholder="Accuracy"/>
        </div>
        <div class="col-md-6 mb-3">
          <label class="form-label small" style="color:var(--text-muted)">Metric Value</label>
          <input type="text" name="metric_value" class="form-control dark-input" placeholder="92%"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">Project Image URL</label>
        <input type="url" name="image_url" id="imgUrl" class="form-control dark-input" placeholder="https://..."/>
        <div class="mt-2" id="imgPreview" style="display:none;">
          <img id="previewImg" src="" alt="Preview" style="width:120px;height:70px;object-fit:cover;border-radius:8px;border:1px solid var(--primary);"/>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label small" style="color:var(--text-muted)">GitHub URL</label>
        <input type="url" name="github_url" class="form-control dark-input"/>
      </div>
      <div class="mb-4">
        <label class="form-label small" style="color:var(--text-muted)">Demo URL</label>
        <input type="url" name="demo_url" class="form-control dark-input"/>
      </div>
      <button type="submit" class="btn btn-glow w-100">Add Project</button>
    </form>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const imgUrl = document.getElementById('imgUrl');
  const preview = document.getElementById('imgPreview');
  const previewImg = document.getElementById('previewImg');
  imgUrl.addEventListener('input', () => {
    const val = imgUrl.value.trim();
    if (val) { previewImg.src = val; preview.style.display = 'block'; }
    else { preview.style.display = 'none'; }
  });
</script>
</body>
</html>
