<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Achievements</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet"/>
</head>
<body>
<nav class="navbar glass-nav px-4 py-3">
  <span class="navbar-brand gradient-text fw-bold" style="font-family:'Orbitron',sans-serif;">Manage Achievements</span>
  <div class="d-flex gap-3">
    <a href="/dashboard" class="btn btn-sm btn-outline-light">← Dashboard</a>
  </div>
</nav>
<div class="container py-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
    <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  <div class="row g-4">
    <div class="col-lg-5">
      <div class="glass-card p-4">
        <h5 class="gradient-text fw-bold mb-4">Add Achievement</h5>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Title</label>
            <input type="text" name="title" class="form-control dark-input" required/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Subtitle</label>
            <input type="text" name="subtitle" class="form-control dark-input"/>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Description</label>
            <textarea name="description" class="form-control dark-input" rows="2"></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label small" style="color:var(--text-muted)">Icon (FA class)</label>
            <input type="text" name="icon" class="form-control dark-input" value="fas fa-trophy"/>
          </div>
          <div class="mb-4">
            <label class="form-label small" style="color:var(--text-muted)">Display Order</label>
            <input type="number" name="display_order" class="form-control dark-input" value="99"/>
          </div>
          <button type="submit" class="btn btn-glow w-100">Add Achievement</button>
        </form>
      </div>
    </div>

    <div class="col-lg-7">
      {% for a in achievements %}
      <div class="glass-card p-4 mb-3">
        <form method="POST" action="/edit-achievement/{{ a.id }}">
          <div class="row g-2 mb-2">
            <div class="col-md-6">
              <input type="text" name="title" class="form-control dark-input form-control-sm" value="{{ a.title }}" required/>
            </div>
            <div class="col-md-6">
              <input type="text" name="subtitle" class="form-control dark-input form-control-sm" value="{{ a.subtitle or '' }}" placeholder="Subtitle"/>
            </div>
            <div class="col-12">
              <textarea name="description" class="form-control dark-input form-control-sm" rows="2">{{ a.description or '' }}</textarea>
            </div>
            <div class="col-md-6">
              <input type="text" name="icon" class="form-control dark-input form-control-sm" value="{{ a.icon or 'fas fa-trophy' }}" placeholder="FA icon class"/>
            </div>
            <div class="col-md-3">
              <input type="number" name="display_order" class="form-control dark-input form-control-sm" value="{{ a.display_order }}"/>
            </div>
            <div class="col-md-3 d-flex gap-2">
              <button type="submit" class="btn btn-sm btn-outline-primary flex-fill">Save</button>
              <a href="/delete-achievement/{{ a.id }}" class="btn btn-sm btn-outline-danger flex-fill" onclick="return confirm('Delete?')">Del</a>
            </div>
          </div>
        </form>
      </div>
      {% endfor %}
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
